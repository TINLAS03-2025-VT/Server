services:
  wireguard-server:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: jacht-wireguard-server
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Amsterdam
      - SERVERURL=thomasenco.com
      - SERVERPORT=51821
      - PEERS=tracker1,gamemaster
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=10.13.13.0/24
      - PERSISTENTKEEPALIVE_PEERS=all
      - LOG_CONFS=false
    volumes:
      - ./wireguard-server:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51821:51820/udp"
      - "10000:10000/tcp"
      - "8888:8888/udp"
      - "18080:18080/tcp"

  jacht-ros-server:
#    build:
 #     context: .
  #    dockerfile: Dockerfile
    image: ghcr.io/tinlas03-2025-vt/server:latest
    container_name: jacht-ros-server
    restart: unless-stopped
    network_mode: service:wireguard-server
    stdin_open: true
    # Equivalent to -t
    tty: true
    depends_on:
      - wireguard-server
    volumes:
      - ./cyclonedds:/cyclonedds:ro
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///cyclonedds/server.xml
    command: >
      bash -lc "
      source /opt/ros/humble/setup.bash &&
      [ -f /ros_ws/install/setup.bash ] && source /ros_ws/install/setup.bash;
      until [ -e /sys/class/net/wg0 ] && ip addr show wg0 | grep -q 'inet 10.13.13.1'; do
        echo 'waiting for contained wg0 10.13.13.1...';
        sleep 1;
      done;
      echo 'jacht-ros-server contained wg0 ready';
      ip addr show wg0;
      ros2 run ros_tcp_endpoint default_server_endpoint
      --ros-args
      -p ROS_IP:=0.0.0.0
      -p ROS_TCP_PORT:=10000"

  micro-ros-agent-udp:
    build:
      context: ./docker/micro-ros-agent-cyclone
      dockerfile: Dockerfile
    image: jacht-micro-ros-agent:humble-cyclone
    container_name: micro-ros-agent-udp
    restart: unless-stopped
    stdin_open: true
    # Equivalent to -t
    tty: true
    network_mode: service:wireguard-server
    depends_on:
      - wireguard-server
    volumes:
      - ./cyclonedds:/cyclonedds:ro
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///cyclonedds/server.xml
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "source /opt/ros/humble/setup.bash &&
      [ -f /uros_ws/install/setup.bash ] && source /uros_ws/install/setup.bash;
      until [ -e /sys/class/net/wg0 ] && ip addr show wg0 | grep -q 'inet 10.13.13.1'; do
        echo 'waiting for contained wg0 10.13.13.1...';
        sleep 1;
      done;
      echo 'micro-ROS agent contained wg0 ready';
      exec ros2 run micro_ros_agent micro_ros_agent udp4 --port 8888"

